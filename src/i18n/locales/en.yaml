# Landing page strings — English (canonical source)
# All other locale files fall back to these values for missing keys.

# Meta
title: "Keep Android Open"
description: "Your phone is about to stop being yours. In September 2026, Google will block every Android app whose developer hasn't registered with them."

# Hero
hero_lede: "Your phone is about to stop being yours."
hero_countdown_label: "days until lockdown"
hero_sub: >-
  Starting September 2026, a silent update, nonconsensually pushed by Google, will <strong>block every Android app</strong> whose developer hasn't registered with Google, signed their contract, paid up, and handed over government ID.
hero_kicker: "Every app and every device, worldwide, with no opt-out."

# What Google is doing
what_heading: "What Google is doing"
what_intro: >-
  In August 2025, Google <a href="https://developer.android.com/developer-verification" target="_blank">announced &#8599;</a> a new requirement: starting September 2026, <strong>every Android app developer must register centrally with Google</strong> before their software can be installed on any device. Not just Play Store apps: all apps. This includes apps shared between friends, distributed through <a href="https://f-droid.org" target="_blank">F-Droid &#8599;</a>, built by hobbyists for personal use. Independent developers, church and community groups, and hobbyists alike will all be frozen out of being able to develop and distribute their software.
what_registration: "Registration requires:"
what_req_fee: "Paying a fee to Google"
what_req_terms: "Agreeing to Google's Terms and Conditions"
what_req_id: "Surrendering your government-issued identification"
what_req_signing: "Providing evidence of your private signing key"
what_req_appids: "Listing all current and all future application identifiers"
what_pullquote: "If a developer does not comply, their apps get silently blocked on every Android device worldwide."

# Who this hurts
impact_heading: "Who this hurts"
impact_you_heading: "You"
impact_you_p1: "You bought an Android phone because Google told you it was open. You could install what you wanted, and that was the deal."
impact_you_p2: >-
  Google is now rewriting that deal, retroactively, on hardware you already own. After the update lands, you can only run software that Google has pre-approved. On your phone: <i>your</i> property, that <i>you</i> paid for.
impact_dev_heading: "Independent developers"
impact_dev_p1: "A teenager's first app, a volunteer's privacy tool, or a company's confidential internal beta. It doesn't matter. After September 2026, none of these can be installed without Google's blessing."
impact_dev_p2: >-
  <a href="https://f-droid.org" target="_blank">F-Droid &#8599;</a>, home to thousands of free and open-source Android apps, has called this an <a href="https://f-droid.org/en/2025/09/29/google-developer-registration-decree.html" target="_blank">"existential" threat &#8599;</a>. Cory Doctorow calls it <a href="https://pluralistic.net/2025/09/01/fulu/" target="_blank">"Darth Android" &#8599;</a>.
impact_gov_heading: "Governments & civil society"
impact_gov_p1: >-
  Google has a <a href="https://www.aclu.org/news/free-speech/app-store-oligopoly" target="_blank">documented track record &#8599;</a> of complying when authoritarian regimes demand app removals. With this program, the software that runs your country's institutions will exist at the pleasure of a single unaccountable foreign corporation.
impact_gov_p2: >-
  The <a href="https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship" target="_blank">EFF calls &#8599;</a> app gatekeeping "an ever-expanding pathway to internet censorship."

# Advanced flow
flow_heading: "Google's \"escape hatch\" is a trap door"
flow_intro: >-
  Google says "power users" can <a href="https://android-developers.googleblog.com/2026/03/android-developer-verification.html" target="_blank">"still install"</a> unverified apps. Here's what that <i>actually</i> looks like:
flow_step1: "Delve into System Settings, find Developer Options"
flow_step2: "Tap the build number <strong>seven times</strong> to enable Developer Mode"
flow_step3: "Dismiss scare screens about coercion"
flow_step4: "Enter your PIN"
flow_step5: "Restart the device"
flow_step6: "<strong>Wait 24 hours</strong>"
flow_step7: "Come back, dismiss more scare screens"
flow_step8: "Pick \"allow temporarily\" (7 days) or \"allow indefinitely\""
flow_step9: "Confirm, again, that you understand \"the risks\""
flow_summary: "Nine steps. A mandatory 24-hour cooling-off period. <em>For installing software on a device you own.</em>"
flow_detail: >-
  Worse: this flow runs entirely through <strong>Google Play Services</strong>, not the Android OS. Google can change it, tighten it, or kill it at any time, with no OS update required and no consent needed. And as of today, it hasn't shipped in any beta, preview, or canary build. It exists only as a blog post and some mockups.

# Precedent
precedent_heading: "This is bigger than Android"
precedent_pullquote: "If Google can retroactively lock down billions of devices that were sold as open platforms, every hardware manufacturer on the planet is watching."
precedent_p1: >-
  The principle being established: <strong>the company that made your device gets to decide, after you've bought it, what software you're allowed to run.</strong> In software, this is called a "rug pull"; but at least you could always install competing software. In hardware, it is a <i>fait accompli</i> that strips you of your agency and renders you powerless to the whims of a single unaccountable gatekeeper and convicted monopolist.
precedent_p2: >-
  Android's openness was never just a feature. It was the <em>promise</em> that distinguished it from iPhone. Millions chose Android for exactly that reason. Google is now revoking that promise unilaterally, on devices <i>already</i> in people's pockets, because they've decided they have enough market dominance and regulatory capture to get away with it.
precedent_arstechnica: >-
  <a href="https://arstechnica.com/gadgets/2026/03/with-developer-verification-googles-apple-envy-threatens-to-dismantle-androids-open-legacy/" target="_blank">Ars Technica &#8599;</a>: <em>"Google's Apple envy threatens to dismantle Android's open legacy."</em>

# Objections
objections_heading: "But wait, isn't this..."
obj_security_q: "\"...just about security?\""
obj_security_a: >-
  The security rationale is a smokescreen. Google Play Protect already scans for malware independent of developer identity. Requiring a government ID doesn't make code safer. It makes <em>developers</em> identifiable and controllable. Malware authors can register. Indie developers and dissidents often can't. The <a href="https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship" target="_blank">EFF &#8599;</a> is blunt: identity-based gatekeeping is a censorship tool, not a security one.
obj_sideloading_q: "\"...still sideloading if you use the advanced flow?\""
obj_sideloading_a: >-
  Nine steps, 24-hour wait, buried in Developer Options, delivered through a proprietary service that Google can revoke whenever they want. That's not sideloading. That's a <strong>deterrence mechanism</strong> built to ensure almost nobody completes it. And since it runs through Play Services rather than the OS, Google can tighten or kill it silently.
obj_hide_q: "\"...only a problem if you have something to hide?\""
obj_hide_a: >-
  Whistleblowers, journalists, and activists under authoritarian governments will be the first victims. People in domestic abuse situations are next. All these groups have legitimate reasons to distribute or use software without putting their legal identity in a Google database. Anonymous open-source contribution is a tradition older than Google itself. This policy ends it on Android.
obj_apple_q: "\"...the same thing Apple does?\""
obj_apple_a: >-
  Apple has been a walled garden from day one. People chose Android <em>because it was different</em>. "Apple does it too" is a race to the bottom and a weak <i>tu quoque</i> argument. And under regulatory pressure (the EU's Digital Markets Act), even Apple is being forced to open up. Google is moving in the opposite direction: attempting to further entrench its gatekeeping status.
obj_cost_q: "\"...just $25 and some paperwork?\""
obj_cost_a: >-
  Maybe, if you're a developer in the US with a credit card and a driver's license. Try being a student in sub-Saharan Africa, or a dissident in Myanmar, or a volunteer maintaining a community health app. The cost isn't only financial: you're surrendering government ID and evidence or your signing keys to a company that <a href="https://www.theregister.com/2025/08/26/android_developer_verification_sideloading/" target="_blank">routinely complies &#8599;</a> with government demands to remove apps and expose developers.

# Fight back
act_heading: "Fight back"
act_everyone_heading: "Everyone"
act_fdroid: >-
  <strong><a href="https://f-droid.org" target="_blank">Install F-Droid &#8599;</a></strong> on every Android device you own. Alternative stores only survive if people actually use them.
act_regulators: >-
  <strong><a href="/cta/#consumers">Contact your regulators.</a></strong> Regulators worldwide are genuinely concerned about monopolies and the centralization of power in the tech sector, and want to hear directly from individuals who are affected and concerned.
act_share: >-
  <strong>Share this page.</strong> Link to <a href="https://keepandroidopen.org">keepandroidopen.org</a> everywhere.
act_astroturf: >-
  <strong>Push back on astroturfers.</strong> The "well, actually..." crowd is out in force. Don't let them set the narrative.
act_petition: >-
  <strong><a href="https://www.change.org/p/stop-google-from-limiting-apk-file-usage/" target="_blank">Sign the change.org petition &#8599;</a></strong> and join the over 100,000 signatories who have made their voices heard.
act_letter: >-
  <strong><a href="/open-letter">Read and share our open letter</a></strong>
act_survey: >-
  <strong>Tell Google what you think of this</strong> through their own <a href="https://docs.google.com/forms/d/e/1FAIpQLSfN3UQeNspQsZCO2ITkdzMxv81rJDEGGjO-UIDDY28Rz_GEVA/viewform?pli=1" target="_blank">developer verification survey &#8599;</a> <small>(for all the good that will do)</small>.
act_dev_heading: "Developers"
act_dev_intro: >-
  <strong style="text-transform: uppercase;">Do not sign up.</strong> Don't join the program by signing up for the Android Developer Console and agreeing to their irrevocable Terms and Conditions. Don't verify your identity. <i>Don't play ball.</i>
act_dev_resist: "Google's plan only works if developers comply. Don't."
act_dev_talk: "Talk other developers and organizations out of signing up."
act_dev_warn: >-
  Add the <a href="https://github.com/woheller69/FreeDroidWarn" target="_blank">FreeDroidWarn library &#8599;</a> to your apps to warn users.
act_dev_banner: >-
  Run a website? <a href="/banner">Add the countdown banner.</a>
act_google_heading: "Google employees"
act_google_text: >-
  If you know something about the program's technical implementation or internal rationale, contact <a href="mailto:tips@keepandroidopen.org">tips@keepandroidopen.org</a> from a <em>non-work</em> machine and a <em>non-Gmail</em> account. Strict confidence guaranteed.

